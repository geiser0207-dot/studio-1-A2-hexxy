<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT2: Icon Design ⚡️</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 200px);
            gap: 50px;
            width: fit-content;
            margin: 73px auto;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .icon img {
            width: 200px;
            height: 200px;
            object-fit: contain;
        }

        .icon .hover-img {
            display: none;
        }

        .icon:hover .default-img {
            display: none;
        }

        .icon:hover .hover-img {
            display: block;
        }
    </style>
</head>

<body>
    <p style="color:rgb(61, 61, 61); text-align: center">Hi there! Click to get sound effect~ </p>

    <div class="icon-grid">

        <div class="icon" onmouseenter="playSound('resource.wav')">
            <img class="default-img" src="resource-before.png">
            <img class="hover-img" src="resource-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('mission.wav')">
            <img class="default-img" src="mission-before.png">
            <img class="hover-img" src="mission-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('save.wav')">
            <img class="default-img" src="save-before.png">
            <img class="hover-img" src="save-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('energytower.wav')">
            <img class="default-img" src="energytower-before.png">
            <img class="hover-img" src="energytower-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('skilltree.wav')">
            <img class="default-img" src="skilltree-before.png">
            <img class="hover-img" src="skilltree-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('sector.wav')">
            <img class="default-img" src="sector-before.png">
            <img class="hover-img" src="sector-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('map.wav')">
            <img class="default-img" src="map-before.png">
            <img class="hover-img" src="map-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('library.wav')">
            <img class="default-img" src="library-before.png">
            <img class="hover-img" src="library-hover.png">
        </div>

        <div class="icon" onmouseenter="playSound('setting.mp3')">
            <img class="default-img" src="setting-before.png">
            <img class="hover-img" src="setting-hover.png">
        </div>

    </div>

    <script>


    function playSound(file) {
        var audio = new Audio(file); audio.play()
    }
</script>

</body>

</html>
